<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DDP Yoga – Energy Workout</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0A0A0A; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const DEFAULT_DURATION = 15;

    const initialMoves = [
      { name: "Supine Breathing", cue: "On your back, breathe deep", section: "Warm-Up" },
      { name: "Table – Cat Arch", cue: "×2", section: "Warm-Up" },
      { name: "Down Dog / Walk Dog", cue: "Pedal it out", section: "Warm-Up" },
      { name: "Plank Hold", cue: "Stay tight", section: "Warm-Up", duration: 10 },
      { name: "Lower – Hold", cue: "Lower 3, hold 3", section: "Warm-Up" },
      { name: "Cobra to Down Dog", cue: "×4", section: "Warm-Up" },
      { name: "Standing Forward Fold", cue: "Breathe and hang", section: "Standing" },
      { name: "Touchdown", cue: "×2", section: "Standing" },
      { name: "Glute Squeeze – Grab Ball", cue: "Squeeze and hold", section: "Standing" },
      { name: "Touchdown", cue: "×2", section: "Standing" },
      { name: "Diamond Cutter", cue: "Hands up, drop it", section: "Standing" },
      { name: "Shake Out", cue: "Shake it loose", section: "Standing" },
      { name: "Touchdown – Gimme", cue: "×2", section: "Standing" },
      { name: "Touchdown – Bent Bar Back", cue: "Pull it back", section: "Standing" },
      { name: "Fold Forward – Bar Back", cue: "Back to bar back", section: "Standing" },
      { name: "Fold Forward – Hold + Bar Back", cue: "Hold and pull", section: "Standing" },
      { name: "Standing Split – Right Leg", cue: "Breathe, 5 seconds", section: "Balance", duration: 5 },
      { name: "Runner's Lunge to Supported Lunge", cue: "Flow between both", section: "Balance" },
      { name: "Lunge – Grab Ball", cue: "Stay low", section: "Balance" },
      { name: "Pull-Ins", cue: "×3", section: "Balance" },
      { name: "Right Hand Block – Left Hand Up", cue: "Align and squeeze glutes", section: "Balance" },
      { name: "Lunge – Dynamic Resistance Punches", cue: "×3 punches", section: "Power" },
      { name: "Blast Off – Explode", cue: "×10, give it everything", section: "Power" },
      { name: "Diamond Cutter – Shake Out", cue: "Water break!", section: "Power", duration: 30 },
      { name: "Grab Ball – Gimme Gimme", cue: "Pull pull pull", section: "Power" },
      { name: "Exploding Knees", cue: "5 each side", section: "Power" },
      { name: "Touchdown – Diamond Cutter", cue: "Flow together", section: "Power" },
      { name: "Huddle Up – Bar Back", cue: "Into huddle position", section: "Cool-Down" },
      { name: "Plank to Alligator to Down", cue: "10 – lower 3 – alligator 3", section: "Cool-Down" },
      { name: "Cobra to Down Dog to Safety Zone", cue: "Flow to safety zone", section: "Cool-Down" },
      { name: "Cat Arch", cue: "×3, slow and deep", section: "Cool-Down" },
      { name: "Split Table", cue: "×10", section: "Floor" },
      { name: "Repeat Other Side", cue: "Same sequence", section: "Floor" },
      { name: "Wag the Tail", cue: "Side to side", section: "Floor" },
      { name: "Cat Arch", cue: "×3", section: "Floor" },
      { name: "Safety Zone", cue: "Rest and breathe", section: "Floor" },
      { name: "Walk Hand Across Mat", cue: "Slow and controlled", section: "Floor" },
      { name: "Repeat Other Side", cue: "Mirror it", section: "Floor" },
      { name: "Safety Zone", cue: "Rest and breathe", section: "Floor" },
      { name: "Glute Squeeze", cue: "Squeeze and hold", section: "Floor" },
      { name: "Human Cannonball", cue: "Curl up tight", section: "Floor" },
      { name: "Bridge", cue: "Hips up, squeeze", section: "Floor" },
      { name: "Repeat", cue: "Same side", section: "Floor" },
      { name: "Knee Cross", cue: "Cross and hold", section: "Floor" },
      { name: "Human Cannonball – Bridge", cue: "Flow between both", section: "Floor" },
      { name: "Other Knee", cue: "Switch sides", section: "Floor" },
      { name: "Human Cannonball – Bridge", cue: "Flow between both", section: "Floor" },
      { name: "Human Cannonball – Bridge", cue: "Flow between both", section: "Floor" },
      { name: "Tight Tight", cue: "Everything tight", section: "Floor" },
      { name: "Kneeling – Bent Knee", cue: "Find your balance", section: "Floor" },
      { name: "Dead Man", cue: "Relax completely", section: "Finish" },
      { name: "Glute Squeeze", cue: "Last one!", section: "Finish" },
      { name: "Stretch Forward", cue: "×3", section: "Finish" },
      { name: "Bang", cue: "You did it! 💥", section: "Finish" },
    ];

    const sectionColors = {
      "Warm-Up":   "#FF6B35",
      "Standing":  "#F0A500",
      "Balance":   "#4ECDC4",
      "Power":     "#FF3366",
      "Cool-Down": "#74B9E7",
      "Floor":     "#6C9BCF",
      "Finish":    "#FFD700",
    };

    // ── Edit Screen ─────────────────────────────────────────────────────────────
    function EditScreen({ moves, onSave, onCancel }) {
      const [drafts, setDrafts] = useState(moves.map(m => ({ ...m })));
      const sections = [...new Set(drafts.map(m => m.section))];

      const update = (i, val) => {
        const n = parseInt(val);
        const updated = [...drafts];
        updated[i] = { ...updated[i], duration: isNaN(n) || n < 1 ? DEFAULT_DURATION : n };
        setDrafts(updated);
      };

      return (
        <div style={{ minHeight: "100vh", background: "#0A0A0A", color: "white", maxWidth: "430px", margin: "0 auto" }}>
          <div style={{
            position: "sticky", top: 0, background: "#0A0A0A",
            padding: "1.2rem 1.5rem", borderBottom: "1px solid #1E1E1E",
            display: "flex", justifyContent: "space-between", alignItems: "center", zIndex: 10
          }}>
            <button onClick={onCancel} style={{ background: "none", border: "none", color: "#888", fontSize: "1rem", cursor: "pointer" }}>
              ✕ Cancel
            </button>
            <span style={{ fontWeight: "700", fontSize: "1rem", letterSpacing: "0.05em" }}>SET DURATIONS</span>
            <button onClick={() => onSave(drafts)} style={{
              background: "#FF6B35", border: "none", color: "white",
              padding: "0.4rem 1rem", borderRadius: "20px", fontWeight: "700", fontSize: "0.9rem", cursor: "pointer"
            }}>Save</button>
          </div>
          <div style={{ padding: "0.5rem 0 4rem" }}>
            {sections.map(sec => (
              <div key={sec}>
                <div style={{
                  padding: "1rem 1.5rem 0.4rem", fontSize: "0.65rem",
                  letterSpacing: "0.18em", textTransform: "uppercase",
                  color: sectionColors[sec], fontWeight: "700"
                }}>{sec}</div>
                {drafts.map((m, i) => m.section !== sec ? null : (
                  <div key={i} style={{
                    display: "flex", alignItems: "center",
                    padding: "0.75rem 1.5rem", borderBottom: "1px solid #141414"
                  }}>
                    <div style={{ flex: 1, fontSize: "0.95rem", lineHeight: 1.3, paddingRight: "1rem" }}>
                      {m.name}
                      <div style={{ fontSize: "0.75rem", color: "#555", marginTop: "2px" }}>{m.cue}</div>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: "0.4rem" }}>
                      <input type="number" value={m.duration || DEFAULT_DURATION} min={1} max={300}
                        onChange={e => update(i, e.target.value)}
                        style={{
                          width: "56px", background: "#1A1A1A", border: "1px solid #333",
                          color: "white", borderRadius: "8px", padding: "0.4rem 0.5rem",
                          fontSize: "1rem", textAlign: "center", fontWeight: "700"
                        }}
                      />
                      <span style={{ fontSize: "0.7rem", color: "#555" }}>sec</span>
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── Main App ─────────────────────────────────────────────────────────────────
    function App() {
      const [moves, setMoves] = useState(() =>
        initialMoves.map(m => ({ ...m, duration: m.duration || DEFAULT_DURATION }))
      );
      const [current, setCurrent] = useState(0);
      const [timeLeft, setTimeLeft] = useState(null);
      const [running, setRunning] = useState(false);
      const [done, setDone] = useState(false);
      const [editing, setEditing] = useState(false);
      const intervalRef = useRef(null);
      const audioCtxRef = useRef(null);
      const isFirstRender = useRef(true);

      const move = moves[current];
      const color = sectionColors[move?.section] || "#FF6B35";
      const totalDuration = move?.duration || DEFAULT_DURATION;

      const wakeAudio = useCallback(() => {
        if (!audioCtxRef.current) {
          audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtxRef.current.state === "suspended") audioCtxRef.current.resume();
      }, []);

      const playBeep = useCallback((freq = 880, dur = 0.12, vol = 0.4) => {
        try {
          wakeAudio();
          const ctx = audioCtxRef.current;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = "sine";
          osc.frequency.setValueAtTime(freq, ctx.currentTime);
          gain.gain.setValueAtTime(vol, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + dur);
        } catch(e) {}
      }, [wakeAudio]);

      const playCountdown = useCallback((n) => {
        if (n === 3) playBeep(660, 0.1, 0.3);
        if (n === 2) playBeep(660, 0.1, 0.3);
        if (n === 1) playBeep(1100, 0.25, 0.5);
      }, [playBeep]);

      const speak = useCallback((text) => {
        try {
          window.speechSynthesis.cancel();
          const u = new SpeechSynthesisUtterance(text);
          u.rate = 0.95; u.pitch = 1.0; u.volume = 1.0;
          window.speechSynthesis.speak(u);
        } catch(e) {}
      }, []);

      // Announce move name on change (skip first render)
      useEffect(() => {
        if (isFirstRender.current) { isFirstRender.current = false; return; }
        speak(moves[current].name);
      }, [current]);

      useEffect(() => { setTimeLeft(totalDuration); }, [current, totalDuration]);

      const goTo = useCallback((index, keepRunning = false) => {
        clearInterval(intervalRef.current);
        if (index >= moves.length) { setDone(true); setRunning(false); return; }
        setCurrent(index);
        if (!keepRunning) setRunning(false);
      }, [moves.length]);

      const goNext = useCallback(() => goTo(current + 1, running), [current, running, goTo]);
      const goPrev = useCallback(() => goTo(Math.max(0, current - 1), false), [current, goTo]);

      useEffect(() => {
        clearInterval(intervalRef.current);
        if (!running) return;
        intervalRef.current = setInterval(() => {
          setTimeLeft(t => {
            const next = t - 1;
            if (next <= 0) { goNext(); return null; }
            if (next <= 3) playCountdown(next);
            return next;
          });
        }, 1000);
        return () => clearInterval(intervalRef.current);
      }, [running, goNext, playCountdown]);

      const handleSave = (updated) => {
        setMoves(updated);
        setEditing(false);
        setTimeLeft(updated[current].duration || DEFAULT_DURATION);
      };

      const reset = () => {
        clearInterval(intervalRef.current);
        setCurrent(0);
        setTimeLeft(moves[0].duration || DEFAULT_DURATION);
        setDone(false);
        setRunning(false);
        isFirstRender.current = true;
      };

      if (editing) return <EditScreen moves={moves} onSave={handleSave} onCancel={() => setEditing(false)} />;

      if (done) return (
        <div style={{
          minHeight: "100vh", display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center",
          background: "#0A0A0A", color: "white", padding: "2rem", textAlign: "center", gap: "1.5rem"
        }}>
          <div style={{ fontSize: "6rem" }}>💥</div>
          <div style={{ fontSize: "3rem", fontWeight: "900", color: "#FFD700", letterSpacing: "0.05em" }}>BANG!</div>
          <div style={{ fontSize: "1.1rem", color: "#666" }}>Energy routine complete.</div>
          <button onClick={reset} style={{
            marginTop: "1rem", padding: "1.1rem 3rem", background: "#FF6B35",
            color: "white", border: "none", borderRadius: "50px",
            fontSize: "1.1rem", fontWeight: "800", cursor: "pointer"
          }}>DO IT AGAIN</button>
        </div>
      );

      const t = timeLeft ?? totalDuration;
      const circumference = 2 * Math.PI * 52;
      const dashOffset = circumference * (1 - Math.max(0, Math.min(1, t / totalDuration)));
      const progressPct = (current / (moves.length - 1)) * 100;

      return (
        <div style={{
          minHeight: "100vh", background: "#0A0A0A", color: "white",
          display: "flex", flexDirection: "column",
          maxWidth: "430px", margin: "0 auto", userSelect: "none"
        }}>

          {/* Top bar */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "1rem 1.5rem 0.5rem" }}>
            <div style={{ fontSize: "0.7rem", letterSpacing: "0.2em", textTransform: "uppercase", color: "#444" }}>
              DDP YOGA · ENERGY
            </div>
            <div style={{ display: "flex", gap: "0.8rem", alignItems: "center" }}>
              <span style={{ fontSize: "0.8rem", color: "#444" }}>{current + 1} / {moves.length}</span>
              <button onClick={() => setEditing(true)} style={{
                background: "none", border: "1px solid #2A2A2A", color: "#666",
                width: "32px", height: "32px", borderRadius: "50%",
                fontSize: "0.85rem", cursor: "pointer", display: "flex",
                alignItems: "center", justifyContent: "center"
              }}>⚙</button>
            </div>
          </div>

          {/* Progress bar */}
          <div style={{ height: "2px", background: "#1A1A1A", margin: "0 1.5rem" }}>
            <div style={{ height: "100%", width: `${progressPct}%`, background: color, transition: "width 0.4s ease", borderRadius: "1px" }} />
          </div>

          {/* Section label */}
          <div style={{ padding: "1rem 1.5rem 0" }}>
            <span style={{ fontSize: "0.72rem", letterSpacing: "0.2em", textTransform: "uppercase", color: color, fontWeight: "700" }}>
              {move.section}
            </span>
          </div>

          {/* Move name */}
          <div style={{ flex: 1, padding: "0.8rem 1.5rem 0", display: "flex", flexDirection: "column", justifyContent: "center" }}>
            <div style={{ fontSize: "clamp(2.2rem, 9vw, 3rem)", fontWeight: "900", lineHeight: 1.1, color: "#FFFFFF", letterSpacing: "-0.02em", marginBottom: "0.8rem" }}>
              {move.name}
            </div>
            <div style={{ fontSize: "clamp(1.1rem, 4.5vw, 1.4rem)", color: "#777", fontWeight: "400", lineHeight: 1.4 }}>
              {move.cue}
            </div>
          </div>

          {/* Timer ring */}
          <div style={{ display: "flex", justifyContent: "center", padding: "1.5rem 1.5rem 0.5rem" }}>
            <svg width="130" height="130" viewBox="0 0 130 130">
              <circle cx="65" cy="65" r="52" fill="none" stroke="#1A1A1A" strokeWidth="6" />
              <circle cx="65" cy="65" r="52" fill="none" stroke={color} strokeWidth="6"
                strokeLinecap="round"
                strokeDasharray={circumference}
                strokeDashoffset={dashOffset}
                transform="rotate(-90 65 65)"
                style={{ transition: running ? "stroke-dashoffset 0.9s linear" : "none" }}
              />
              <text x="65" y="60" textAnchor="middle" fill="white"
                style={{ fontSize: "2.4rem", fontWeight: "900", fontFamily: "inherit" }}>{t}</text>
              <text x="65" y="80" textAnchor="middle" fill="#444"
                style={{ fontSize: "0.62rem", fontFamily: "inherit", letterSpacing: "0.15em" }}>SECONDS</text>
            </svg>
          </div>

          {/* Controls */}
          <div style={{ padding: "0.5rem 1.5rem 2.5rem", display: "flex", gap: "0.8rem", alignItems: "center" }}>
            <button onClick={goPrev} disabled={current === 0} style={{
              width: "60px", height: "60px", borderRadius: "50%",
              background: "#141414", border: "1px solid #2A2A2A",
              color: current === 0 ? "#2A2A2A" : "#FFFFFF",
              fontSize: "1.6rem", cursor: current === 0 ? "default" : "pointer",
              display: "flex", alignItems: "center", justifyContent: "center"
            }}>‹</button>

            <button onClick={() => { wakeAudio(); setRunning(r => !r); }} style={{
              flex: 1, height: "66px", borderRadius: "16px",
              background: running ? "#141414" : color,
              border: running ? `2px solid ${color}` : "none",
              color: running ? color : "#000",
              fontSize: "1.1rem", fontWeight: "900",
              cursor: "pointer", letterSpacing: "0.12em", transition: "all 0.2s"
            }}>
              {running ? "⏸  PAUSE" : "▶  START"}
            </button>

            <button onClick={goNext} style={{
              width: "60px", height: "60px", borderRadius: "50%",
              background: "#141414", border: `1px solid ${color}55`,
              color: "#FFFFFF", fontSize: "1.6rem", cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center"
            }}>›</button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
